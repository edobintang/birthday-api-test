version: "3.9"

services:
  api:
    build: .
    command: node src/server.js
    ports:
      - "3000:3000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/birthday
      - PORT=3000
    depends_on:
      - mongo

  worker:
    build: .
    command: node src/worker/index.js
    environment:
      - MONGO_URI=mongodb://mongo:27017/birthday
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
